# 自动发布带签名更新的 GitHub Release。
#
# 触发：
#   - 推送 v* 形式的 tag（如 git tag v0.1.1 && git push --tags）
#   - 手动 workflow_dispatch
#
# 所需 secrets（Settings → Secrets and variables → Actions）：
#   TAURI_SIGNING_PRIVATE_KEY            私钥文件内容（cat ~/.tauri/aether-updater.key 的输出）
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD   私钥密码；私钥无密码则填空字符串
#
# 说明：
#   - tauri-action 只负责构建和签名
#   - latest.json 由 workflow 显式生成，确保包含平台 signature

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag, for example v0.1.1'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust (universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm deps
        run: npm ci

      - name: Build & sign & release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: ${{ env.RELEASE_TAG }}
          releaseBody: 'Aether Explorer ${{ env.RELEASE_TAG }}'
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin
          uploadUpdaterJson: false
          updaterJsonPreferNsis: false

      - name: Upload updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"
          BUNDLE_DIR="src-tauri/target/release/bundle"

          DMG="$(find "$BUNDLE_DIR/dmg" -type f -name '*.dmg' | head -n 1)"
          APP_TAR="$(find "$BUNDLE_DIR/macos" -type f -name '*.app.tar.gz' | head -n 1)"
          APP_SIG="$(find "$BUNDLE_DIR/macos" -type f -name '*.app.tar.gz.sig' | head -n 1)"

          [ -n "$DMG" ] || { echo "missing dmg artifact"; exit 1; }
          [ -n "$APP_TAR" ] || { echo "missing app.tar.gz artifact"; exit 1; }
          [ -n "$APP_SIG" ] || { echo "missing app.tar.gz.sig artifact"; exit 1; }

          APP_TAR_NAME="$(basename "$APP_TAR")"
          APP_TAR_URL="https://github.com/$REPO/releases/download/$TAG/$APP_TAR_NAME"
          SIG_CONTENT="$(cat "$APP_SIG")"
          PUB_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          LATEST_JSON="$(mktemp -t latest-json).json"
          jq -n \
            --arg version "$VERSION" \
            --arg notes "Aether Explorer $TAG" \
            --arg pub_date "$PUB_DATE" \
            --arg sig "$SIG_CONTENT" \
            --arg url "$APP_TAR_URL" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $sig, url: $url },
                "darwin-x86_64":  { signature: $sig, url: $url }
              }
            }' > "$LATEST_JSON"

          gh release upload "$TAG" -R "$REPO" \
            "$DMG" "$APP_TAR" "$APP_SIG" "$LATEST_JSON#latest.json" --clobber
