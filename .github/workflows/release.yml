# 自动发布带签名更新的 GitHub Release。
#
# 触发：
#   - 推送 v* 形式的 tag（如 git tag v0.2.0 && git push --tags）
#   - 手动 workflow_dispatch
#
# 所需 secrets（Settings → Secrets and variables → Actions）：
#   TAURI_SIGNING_PRIVATE_KEY            私钥文件内容（cat ~/.tauri/aether-updater.key 的输出）
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD   私钥密码；私钥无密码则填空字符串
#
# 说明：
#   - workflow 直接调用 Tauri CLI 构建和签名，不使用 tauri-action 上传半成品
#   - latest.json 由 workflow 显式生成，确保包含平台 signature
#   - 构建产物、签名、manifest 齐全后才统一上传到 GitHub Release

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag, for example v0.2.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust (universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm deps
        run: npm ci

      - name: Validate release inputs
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "invalid RELEASE_TAG: ${RELEASE_TAG}";
            exit 1;
          }
          [ -n "${TAURI_SIGNING_PRIVATE_KEY:-}" ] || {
            echo "missing TAURI_SIGNING_PRIVATE_KEY secret";
            exit 1;
          }

          VERSION="${RELEASE_TAG#v}"
          TAURI_VERSION="$(jq -r '.version' src-tauri/tauri.conf.json)"
          CARGO_VERSION="$(awk -F ' *= *' '/^version = / { gsub(/\"/, "", $2); print $2; exit }' src-tauri/Cargo.toml)"

          [ "$TAURI_VERSION" = "$VERSION" ] || {
            echo "tauri.conf.json version $TAURI_VERSION does not match $RELEASE_TAG";
            exit 1;
          }
          [ "$CARGO_VERSION" = "$VERSION" ] || {
            echo "Cargo.toml version $CARGO_VERSION does not match $RELEASE_TAG";
            exit 1;
          }

      - name: Build signed universal bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx @tauri-apps/cli build --target universal-apple-darwin

      - name: Upload release assets and manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${RELEASE_TAG}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"
          if [ -d "src-tauri/target/universal-apple-darwin/release/bundle" ]; then
            BUNDLE_DIR="src-tauri/target/universal-apple-darwin/release/bundle"
          else
            BUNDLE_DIR="src-tauri/target/release/bundle"
          fi

          DMG="$(find "$BUNDLE_DIR/dmg" -type f -name '*.dmg' | head -n 1)"
          APP_TAR="$(find "$BUNDLE_DIR/macos" -type f -name '*.app.tar.gz' | head -n 1)"
          APP_SIG="$(find "$BUNDLE_DIR/macos" -type f -name '*.app.tar.gz.sig' | head -n 1)"

          [ -n "$DMG" ] || { echo "missing dmg artifact"; exit 1; }
          [ -n "$APP_TAR" ] || { echo "missing app.tar.gz artifact"; exit 1; }
          [ -n "$APP_SIG" ] || { echo "missing app.tar.gz.sig artifact"; exit 1; }

          APP_TAR_NAME="$(basename "$APP_TAR")"
          APP_TAR_URL="https://github.com/$REPO/releases/download/$TAG/$APP_TAR_NAME"
          SIG_CONTENT="$(cat "$APP_SIG")"
          PUB_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          LATEST_JSON="$(mktemp -t latest-json).json"
          jq -n \
            --arg version "$VERSION" \
            --arg notes "Aether Explorer $TAG" \
            --arg pub_date "$PUB_DATE" \
            --arg sig "$SIG_CONTENT" \
            --arg url "$APP_TAR_URL" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $sig, url: $url },
                "darwin-x86_64":  { signature: $sig, url: $url }
              }
            }' > "$LATEST_JSON"

          if gh release view "$TAG" -R "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" -R "$REPO" \
              "$DMG" "$APP_TAR" "$APP_SIG" "$LATEST_JSON#latest.json" --clobber
          else
            gh release create "$TAG" -R "$REPO" \
              --title "$TAG" \
              --notes "Aether Explorer $TAG" \
              "$DMG" "$APP_TAR" "$APP_SIG" "$LATEST_JSON#latest.json"
          fi

          echo "Validating uploaded release assets..."
          DMG_NAME="$(basename "$DMG")"
          APP_SIG_NAME="$(basename "$APP_SIG")"
          gh release view "$TAG" -R "$REPO" --json assets \
            | jq -e \
              --arg dmg "$DMG_NAME" \
              --arg app "$APP_TAR_NAME" \
              --arg sig "$APP_SIG_NAME" '
                [.assets[].name] as $names
                | ($names | index($dmg))
                and ($names | index($app))
                and ($names | index($sig))
                and ($names | index("latest.json"))
              ' >/dev/null

          echo "Validating uploaded updater manifest..."
          curl -fsSL --retry 5 --retry-delay 2 \
            "https://github.com/$REPO/releases/download/$TAG/latest.json" \
            | jq -e \
              --arg version "$VERSION" \
              --arg url "$APP_TAR_URL" '
                .version == $version
                and (.platforms["darwin-aarch64"].signature | length > 0)
                and (.platforms["darwin-x86_64"].signature | length > 0)
                and .platforms["darwin-aarch64"].url == $url
                and .platforms["darwin-x86_64"].url == $url
              ' >/dev/null

          echo "Release $TAG is complete."
